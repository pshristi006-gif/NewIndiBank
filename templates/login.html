<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="form-card">

    <h2>Login</h2>

    <form action="/dashboard">

        <input type="text"
               placeholder="Username"
               required>

        <input type="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
